### model
model_name_or_path: /data/model_weights/ConceptQwen3-VL-2B-inst-RandomInit
image_max_pixels: 262144
video_max_pixels: 16384
trust_remote_code: true
conceptmodel_initialize_query_embedding_model: true

### method
stage: sft
do_train: true
finetuning_type: full
freeze_vision_tower: true          # 冻结视觉编码器
freeze_multi_modal_projector: true # 冻结已有的投影层
freeze_language_model: false        # 冻结 LLM 
deepspeed: examples/deepspeed/ds_z2_config.json

### dataset
dataset: llava_pretrain
template: qwen3_vl_nothink_concept # no thinking
cutoff_len: 12800
max_samples: 99999999999 # debug
preprocessing_num_workers: 32
dataloader_num_workers: 32

### output
output_dir: saves/conceptqwen3-vl-2b-inst/llavapretrain/full/sft-0304
logging_steps: 10
save_steps: 5000
plot_loss: true
overwrite_output_dir: true
save_only_model: false
report_to: wandb  # choices: [none, wandb, tensorboard, swanlab, mlflow]

### train # 8 gpus, batch_size=2, gradient_accumulation_steps=8, effective_batch_size=128
per_device_train_batch_size: 16
gradient_accumulation_steps: 1
learning_rate: 2.0e-5
num_train_epochs: 2.0
lr_scheduler_type: cosine
warmup_ratio: 0.1
bf16: true
ddp_timeout: 180000000
resume_from_checkpoint: null

